<!DOCTYPE html>
<html>
	<head>
		<title id='title'>My Space :></title>
		<link rel="stylesheet" href="../CSS/Aila.css" >
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Pacifico">
	</head>
	<style>
		body {
			background: url("../IMAGES/NightSky.jpg") no-repeat fixed center;
			background-size: cover;
		}

		div.ourPictures{
			align: center;
			
		}
		
		img.ourPictures {
			width:70%;
			height:auto;
			border-radius:10px;
			margin-left:15%;
		}
		
		img.ourPictures[src='./IMAGES/NoPicture.jpg'] {
			opacity: 0.4;
		}
		
		.bottomLeft {
			position: absolute;
			bottom: 0px;
			left: 0px;
		}
		
		.bottomRight {
			position: absolute;
			bottom: 0px;
			right: 0px;
		}
		
		input{
			padding:7px;
			width:20%;
			border-radius:5px;
			margin-bottom:30px;
		}
		
		button {
			display:block;
			font-family: Pacifico;
			border-style:solid;
			display:inline-block;
			padding:0px 20px;
			font-size:20px;
			border-radius:10px; 
			border-color:transparent;
			cursor:pointer;
			width:25%;
		}
		
		img {
			width:60%;
			border-radius:5px;
		}
		
		.input {
			margin-left:10%;
		}
		div {
			width:100%;
			align-items:center;
			border-color:red;
			border-radius:3px;
			text-align:center;
		}
	</style>
	<body>
		<header>
		</header>
		<main>
		</main>
		<h1>Upload memories <a id='heart_link'href='../index.html' style='text-decoration:none; color: white;'> &hearts; </a></h1> <!--Verander my naar our, als condities true worden -->
		<div>
			<button id="selectBtn">Select Memory</button>
		</div>
		<div id="imageDiv" style="margin-bottom:30%;">
			<img id="previewImage" src="">
		</div>
		<div class='input' id="inputField" style="display:none">
			What description should the image have?	
			<input type="text" id="imageDescription">
		</div>
		<input type="file" id="fileInput" accept="image/*" style="display:none;" />
		<div>
			<button id="storeBtn" style="display:none">Store memory</button>
		</div>
	</body>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js">
		const cloudName = "dgtjvawpe";
		const uploadPreset = "photobook";
		
		const supabaseUrl = "https://jlnuezzhtcezunqbkrsn.supabase.co";
		const supabaseKey = "sb_publishable_Y7rUfA1G6_tsTX7kvB7V5g_UZiXLcdI";
		const supabased = supabase.createClient(supabaseUrl, supabaseKey);
		
		const selectBtn = document.getElementById("selectBtn");
		const fileInput = document.getElementById("fileInput");
		const storeBtn = document.getElementById("storeBtn");
		const preview = document.getElementById("previewImage");
		const imageDiv = document.getElementById("imageDiv");
		const inputDiv = document.getElementById("inputField");
		
		selectBtn.addEventListener("click", () => {
			fileInput.click();
		});
		
		fileInput.addEventListener("change", () => {
			const file = fileInput.files[0];
			if (!file) return;

			selectedFile = file;
			
			// Show local preview
			preview.src = URL.createObjectURL(file);
			imageDiv.style.marginBottom = "5%";
			imageDiv.style.marginTop = "5%";
			storeBtn.style.display = "inline";
			inputDiv.style.display = "inline";
		});
		
		storeBtn.addEventListener("click", async () => {
			const file = fileInput.files[0];
			if (!file) 
			{
				alert("No image selected");
				return;
			}
		  
			  // Upload to Cloudinary
			  const formData = new FormData();
			  formData.append("file", file);
			  formData.append("upload_preset", uploadPreset);

				try {
					const response = await fetch(
						`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
						{
							method: "POST",
							body: formData
						}
					);

					const data = await response.json();
					const inputUrl = data.secure_url;
					const inputCaption = document.getElementById("imageDescription").value;
					const newImage = {
						title: "Photo",
						body: JSON.stringify({
					      	url: inputUrl,
							caption: inputCaption
					    }),
						labels: ["photo"]
					};
					console.log(newImage);
					await appendToSupabase(inputUrl, inputCaption);
					//window.location.replace("../HTML/Aila_Main.html");
				} catch (error) {
				console.error("Upload failed:", error);
			}
	});
	
	async function appendToSupabase(iUrl, iCaption) {
		let { data, error } = await supabased.from('photos').insert([
      		{ url: iUrl, caption: iCaption }
   		]);
		
		console.log("JSON updated on GitHub!");

	}
	</script>
</html>
