		async function fetchPrivateJSON() {
		  const apiUrl = `../JSON/data.json`;
		
		  const response = await fetch(apiUrl);
		  const fileData = await response.json();
			console.log(fileData);
		  const json = JSON.parse(fileData);

		  console.log(json);
		  return json;
		}
		async function loadGallery() {
			const data = await fetchPrivateJSON(); // or fetchJSON() for public repo
			let i = 0;
			data.images.forEach(entry => {
				divName = "picNum" + i;
				var divElement = document.createElement("div");
				divElement.id = divName;
				divElement.classList.add('ourPictures');
				var pElement = document.createElement("p");
				pElement.classList.add('ourPictures');
				if(entry.caption)
					pElement.innerHTML  = entry.caption;
				var imgElement = document.createElement('img');
				imgElement.classList.add('ourPictures');
				imgElement.src = entry.url;
				document.getElementById("photos").appendChild(divElement);
				document.getElementById(divName).appendChild(pElement);
				document.getElementById(divName).appendChild(imgElement);
				i++;
				}

			);
		}
